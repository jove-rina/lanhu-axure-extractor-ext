<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蓝湖 Axure 提取器</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📄 文档构建</h1>
      <p class="subtitle">从蓝湖 Axure 原型中拾取内容，组装成 Markdown 文档</p>
    </header>

    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">就绪</span>
    </div>

    <div class="actions">
      <button id="btnBuilder" class="btn btn-primary">
        📄 打开文档构建器
      </button>
    </div>

    <footer>
      <span class="footer-info">v2.0 · 文档构建模式</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
